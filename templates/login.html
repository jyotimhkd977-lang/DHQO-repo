{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-hospital-alt fa-3x text-navy mb-2"></i>
            <h4 class="fw-bold text-navy">System Login</h4>
            <p class="text-muted small">Patient, receptionist, doctor, and admin access</p>
          </div>

          <form method="POST" action="{{ url_for('login') }}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">
                <i class="fas fa-mobile-alt me-1 text-cyan"></i>Indian Mobile Number
              </label>
              <div class="input-group">
                <span class="input-group-text bg-light">+91</span>
                <input type="text" name="phone" class="form-control" placeholder="9XXXXXXXXX" maxlength="10" required pattern="[6-9][0-9]{9}">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">
                <i class="fas fa-lock me-1 text-cyan"></i>Password
              </label>
              <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
              <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
          </form>

          <hr class="my-4">
          <div class="text-center mb-3">
            <a href="{{ url_for('register') }}" class="btn btn-outline-primary btn-sm">
              <i class="fas fa-user-plus me-1"></i>Patient Registration
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
