{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-user-plus fa-3x text-navy mb-2"></i>
            <h4 class="fw-bold text-navy">Patient Registration</h4>
            <p class="text-muted small mb-0">Doctor and receptionist logins are created only by admin</p>
          </div>

          <form method="POST" action="{{ url_for('register') }}" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Mobile Number</label>
              <div class="input-group">
                <span class="input-group-text bg-light">+91</span>
                <input type="text" name="phone" class="form-control" placeholder="9XXXXXXXXX" maxlength="10" required pattern="[6-9][0-9]{9}">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <input type="password" name="password" class="form-control" minlength="4" required>
            </div>

            <button type="submit" class="btn btn-navy w-100 py-2 fw-semibold">
              <i class="fas fa-check-circle me-2"></i>Register
            </button>
          </form>

          <div class="text-center mt-3">
            <a href="{{ url_for('login') }}" class="small text-decoration-none">
              Already registered? Login here
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
